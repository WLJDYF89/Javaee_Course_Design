<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin:0; padding:0; box-sizing:border-box; font-family:'Microsoft Yahei',sans-serif;
        }
        body { background:#dadfe5; color:#111827; padding:0px 24px 24px 24px; }

        .page-title {
            font-size:22px; font-weight:700; color:#111827; margin-bottom:20px;
        }
        .card {
            background:#e6e9f0; border-radius:16px; padding:20px;
            box-shadow:0 2px 12px rgba(0,0,0,0.06);
            min-height: calc(100vh - 200px);

        }
        .add-btn {
            padding:10px 22px;
            background:#507593; color:#fff; border:none; border-radius:999px;
            font-size:14px; font-weight:600; cursor:pointer; transition:0.2s;
            margin-bottom:44px;
        }
        .add-btn:hover { background:#1e1e2e; }

        table { width:100%; border-collapse:collapse; }
        table thead th {
            color:#9ca3af; text-align:left; padding:12px 16px; font-size:13px;
            font-weight:600; border-bottom:1px solid #f3f4f6;
        }
        table tbody td {
            padding:14px 16px; font-size:14px; color:#4b5563;
            border-bottom:1px solid #f9fafb;
        }
        .edit {
            padding:6px 16px; background:#507593; color:#fff; border:none;
            border-radius:999px; font-size:13px; font-weight:600; margin-right:8px;
            cursor:pointer; transition:0.2s; text-decoration:none; display:inline-block;
        }
        .edit:hover { background:#1e1e2e; }

        .del {
            padding:6px 16px; background:#ef4444; color:#fff; text-decoration:none;
            border-radius:999px; font-size:13px; font-weight:600; transition:0.2s;
        }
        .del:hover { background:#dc2626; }
    </style>
</head>
<body>
<h2 class="page-title">分类管理</h2>
<div style="display:flex; justify-content:flex-end; margin-bottom:40px;">
    <button class="add-btn" onclick="openCategoryModal()">+ 新增分类</button>
</div>
<div class="card">

    <table>
        <thead><tr><th>ID</th><th>分类名称</th><th>分类描述</th><th>操作</th></tr></thead>
        <tbody>
        <tr th:each="cate : ${categoryList}">
            <td th:text="${cate.id}"></td>
            <td th:text="${cate.name}"></td>
            <td th:text="${cate.descp}"></td>
            <td>
                <a class="edit" href="javascript:void(0)"
                   th:attr="data-id=${cate.id},data-name=${cate.name},data-descp=${cate.descp}"
                   onclick="openCategoryModal(this)">编辑</a>
                <a class="del" th:href="@{/category/delete/{id}(id=${cate.id})}" onclick="return confirm('确定删除吗？')">删除</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    function openCategoryModal(el) {
        var config = {
            type: 'openCategoryModal',
            saveUrl: '/category/save'
        };
        if (el && el.dataset.id) {
            config.title = '编辑分类';
            config.data = {
                id: el.dataset.id,
                name: el.dataset.name,
                descp: el.dataset.descp
            };
        } else {
            config.title = '新增分类';
            config.data = {};
        }
        window.parent.postMessage(config, '*');
    }
</script>
</body>
</html>
