<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }
        body {
            background: #dadfe5;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; gap: 20px;
        }
        .welcome-card {
            width: 520px;
            padding: 48px 40px;
            background: #e6e9f0;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            text-align: center;
        }
        .welcome-card h2 {
            font-size: 28px; color: #111827; margin-bottom: 14px;
        }
        .welcome-card p {
            font-size: 15px; color: #6b7280; line-height: 1.7;
        }
        .card-row {
            display: flex; gap: 16px; width: 520px;
        }
        .nav-card {
            flex: 1;
            padding: 28px 20px;
            background: #e6e9f0;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }
        .nav-card:hover {
            background: #507593;
        }
        .nav-card h3 {
            font-size: 18px; color: #111827; margin-bottom: 6px;
            transition: 0.2s;
        }
        .nav-card:hover h3 {
            color: #ffffff;
        }
        .nav-card p {
            font-size: 13px; color: #9ca3af;
            transition: 0.2s;
        }
        .nav-card:hover p {
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>

<div class="welcome-card">
    <h2>欢迎登录 SmartShop</h2>
    <p>企业级电商管理系统<br>多环境、持久层、权限、缓存全栈整合</p>
</div>
<div class="card-row">
    <a class="nav-card" href="javascript:void(0)" onclick="window.parent.postMessage({type:'nav',url:'/product/list'},'*')">
        <h3>📦 商品管理</h3>
        <p>查看与管理商品信息</p>
    </a>
    <a class="nav-card" href="javascript:void(0)" onclick="window.parent.postMessage({type:'nav',url:'/category/list'},'*')">
        <h3>📂 分类管理</h3>
        <p>管理商品分类目录</p>
    </a>

</div>
</body>
</html>
