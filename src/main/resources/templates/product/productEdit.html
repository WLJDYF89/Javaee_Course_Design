<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }

        body {
            background: transparent;
            color: #e0e7ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .page-title {
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            width: 50%;
            background: rgba(30, 27, 75, 0.85);
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 24px;
            padding: 28px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 35px rgba(139, 92, 246, 0.25);
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
            color: #c7d2fe;
            font-size: 14px;
        }

        .form-item input,
        .form-item select,
        .form-item textarea {
            width: 100%;
            padding: 10px 12px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 12px;
            color: #e0e7ff;
            font-size: 15px;
            outline: none;
        }

        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .form-item textarea {
            min-height: 90px;
            resize: none;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .save-btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            border: none;
            border-radius: 999px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .save-btn:hover {
            filter: brightness(1.08);
        }

        .cancel-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 999px;
            color: #c7d2fe;
            font-size: 15px;
            text-decoration: none;
            text-align: center;
            transition: 0.2s;
        }

        .cancel-btn:hover {
            background: rgba(139, 92, 246, 0.15);
        }
    </style>
</head>
<body>

<h2 class="page-title" th:text="${product.id == null} ? '新增商品' : '编辑商品'">编辑商品</h2>

<div class="card">
    <form th:action="@{/product/save}" method="post">
        <input type="hidden" name="id" th:value="${product.id}">

        <div class="form-item">
            <label>商品名称</label>
            <input name="name" th:value="${product.name}" required>
        </div>

        <div class="form-item">
            <label>售价</label>
            <input name="price" type="number" step="0.01" th:value="${product.price}" required>
        </div>

        <div class="form-item">
            <label>所属分类</label>
            <select name="catId" required>
                <option value="">-- 请选择分类 --</option>
                <option th:each="cate:${cateList}" th:value="${cate.id}" th:text="${cate.name}"
                        th:selected="${cate.id == product.catId}"></option>
            </select>
        </div>

        <div class="form-item">
            <label>商品描述</label>
            <textarea name="descp" th:text="${product.descp}"></textarea>
        </div>

        <div class="form-item">
            <label>图片URL</label>
            <input name="photoUrl" th:value="${product.photoUrl}">
        </div>

        <div class="form-item">
            <label>发布日期</label>
            <input name="releaseDate" type="date" th:value="${product.releaseDate}">
        </div>

        <div class="btn-row">
            <button class="save-btn" type="submit">保存</button>
            <a class="cancel-btn" th:href="@{/product/list}">取消</a>
        </div>
    </form>
</div>

</body>
</html>
