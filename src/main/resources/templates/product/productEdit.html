<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Microsoft Yahei',sans-serif; }
        body {
            background:#dadfe5; color:#111827; min-height:100vh;
            display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;
        }
        .page-title { font-size:22px; font-weight:700; margin-bottom:20px; }
        .card {
            width:50%; background:#ffffff; border-radius:16px; padding:28px;
            box-shadow:0 2px 12px rgba(0,0,0,0.06);
        }

        .form-item { margin-bottom:16px; }
        .form-item label { display:block; margin-bottom:6px; color:#4b5563; font-size:14px; }
        .form-item input, .form-item select, .form-item textarea {
            width:100%; padding:10px 12px; background:#eef1f7; border:1px solid #e5e7eb;
            border-radius:10px; color:#111827; font-size:15px; outline:none;
        }
        .form-item input:focus, .form-item select:focus, .form-item textarea:focus { border-color:#8b5cf6; }
        .form-item textarea { min-height:90px; resize:none; }
        .btn-row { display:flex; gap:12px; margin-top:20px; }
        .save-btn {
            flex:1; padding:12px; background:#507593; border:none; border-radius:999px;
            color:#fff; font-size:15px; font-weight:600; cursor:pointer; transition:0.2s;
        }
        .save-btn:hover { background:#1e1e2e; }

        .cancel-btn {
            flex:1; padding:12px; background:#f3f4f6; border:1px solid #e5e7eb;
            border-radius:999px; color:#4b5563; font-size:15px; text-decoration:none;
            text-align:center; transition:0.2s;
        }
        .cancel-btn:hover { background:#e5e7eb; }
    </style>
</head>
<body>
<h2 class="page-title" th:text="${product.id == null} ? '新增商品' : '编辑商品'">编辑商品</h2>
<div class="card">
    <form th:action="@{/product/save}" method="post">
        <input type="hidden" name="id" th:value="${product.id}">
        <div class="form-item"><label>商品名称</label><input name="name" th:value="${product.name}" required></div>
        <div class="form-item"><label>售价</label><input name="price" type="number" step="0.01" th:value="${product.price}" required></div>
        <div class="form-item"><label>所属分类</label>
            <select name="catId" required>
                <option value="">-- 请选择分类 --</option>
                <option th:each="cate:${cateList}" th:value="${cate.id}" th:text="${cate.name}" th:selected="${cate.id == product.catId}"></option>
            </select>
        </div>
        <div class="form-item"><label>商品描述</label><textarea name="descp" th:text="${product.descp}"></textarea></div>
        <div class="form-item"><label>图片URL</label><input name="photoUrl" th:value="${product.photoUrl}"></div>
        <div class="form-item"><label>发布日期</label><input name="releaseDate" type="date" th:value="${product.releaseDate}"></div>
        <div class="btn-row">
            <button class="save-btn" type="submit">保存</button>
            <a class="cancel-btn" th:href="@{/product/list}">取消</a>
        </div>
    </form>
</div>
</body>
</html>
