<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
</head>
<body style="width:400px;margin:100px auto;">
<h2>SmartShop 登录</h2>
<form th:action="@{/doLogin}" method="post">
    <p>账号：<input type="text" name="username" required></p>
    <p>密码：<input type="password" name="password" required></p>
    <p style="color:red" th:if="${param.error}" th:text="账号或密码错误"></p>
    <button type="submit">登录</button>
</form>
<p style="margin-top:12px;">没有账号？<a th:href="@{/register}">立即注册</a></p>
</body>
</html>
