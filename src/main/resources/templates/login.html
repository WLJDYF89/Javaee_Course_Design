<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5% 8%;
            background: url('/雪山背景.png') center/auto no-repeat;
            background-color: #f0f0f0;
            position: relative;
            overflow: hidden;
        }



        /* 右侧登录卡片 */
        .login-box {
            width: 420px;
            padding: 36px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow:
                    0 18px 45px rgba(0, 0, 0, 0.08),
                    0 0 0 1px rgba(168, 85, 247, 0.04);
            z-index: 1;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
            color: #1e293b;
        }

        .login-box .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
            color: #64748b;
            font-size: 14px;
        }

        .form-item input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(248, 250, 252, 0.95);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: #1e293b;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }

        .form-item input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
        }

        .err {
            color: #ef4444;
            margin-bottom: 12px;
            text-align: center;
            font-size: 14px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #7dd3fc, #507593);
            border: none;
            border-radius: 999px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }


        .login-btn:hover {
            filter: brightness(1.08);
        }

        .register-link {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            color: #94a3b8;
        }

        .register-link a {
            color: #043fc5;
            text-decoration: none;
            font-weight: 500;
        }


        .register-link a:hover {
            color: #38bdf8;
        }

        /* 小屏幕适配 */
        @media (max-width: 992px) {
            body {
                justify-content: center;
                padding: 20px;
            }

            .login-box {
                width: 100%;
                max-width: 420px;
            }
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Smart Shop 登录</h2>
    <p class="subtitle">Nice to see you back!</p>

    <form th:action="@{/doLogin}" method="post">
        <div class="form-item">
            <label>账号</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-item">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>

        <div class="err" th:if="${param.error}">账号或密码错误</div>

        <button class="login-btn" type="submit">登录</button>
    </form>

    <p class="register-link">
        还没有账号？<a th:href="@{/register}">立即注册</a>
    </p>
</div>

</body>
</html>
