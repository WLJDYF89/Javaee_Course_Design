<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>操作成功</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                    radial-gradient(circle at top left, rgba(102, 126, 234, 0.45), transparent 35%),
                    radial-gradient(circle at bottom right, rgba(118, 75, 162, 0.45), transparent 35%),
                    linear-gradient(135deg, #0f172a 0%, #1e1b4b 45%, #0f172a 100%);
            color: #e0e7ff;
        }

        .card {
            width: 360px;
            padding: 32px;
            background: rgba(30, 27, 75, 0.88);
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 45px rgba(139, 92, 246, 0.35);
            text-align: center;
        }

        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #ffffff;
        }

        .tip {
            font-size: 18px;
            color: #c7d2fe;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            color: #ffffff;
            text-decoration: none;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn:hover {
            filter: brightness(1.08);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">✔</div>
    <div class="tip">操作成功</div>
    <a class="btn" th:href="${returnUrl}">返回</a>
</div>
</body>
</html>
