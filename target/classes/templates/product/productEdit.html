<h3 th:text="${product.id == null} ? '新增商品' : '编辑商品'">编辑商品</h3>

<form th:action="@{/product/save}" method="post" style="width:500px;margin-top:20px;">
    <input type="hidden" name="id" th:value="${product.id}">

    <div style="margin-bottom:12px;">
        <label>商品名称：</label>
        <input name="name" th:value="${product.name}" required style="width:100%;padding:6px;">
    </div>

    <div style="margin-bottom:12px;">
        <label>售价：</label>
        <input name="price" type="number" step="0.01" th:value="${product.price}" required style="width:100%;padding:6px;">
    </div>

    <div style="margin-bottom:12px;">
        <label>所属分类：</label>
        <select name="catId" required style="width:100%;padding:6px;">
            <option value="">-- 请选择分类 --</option>
            <option th:each="cate:${cateList}" th:value="${cate.id}" th:text="${cate.name}"
                    th:selected="${cate.id == product.catId}"></option>
        </select>
    </div>

    <div style="margin-bottom:12px;">
        <label>商品描述：</label>
        <textarea name="descp" th:text="${product.descp}" style="width:100%;padding:6px;height:80px;"></textarea>
    </div>

    <div style="margin-bottom:12px;">
        <label>图片URL：</label>
        <input name="photoUrl" th:value="${product.photoUrl}" style="width:100%;padding:6px;">
    </div>

    <div style="margin-bottom:12px;">
        <label>发布日期：</label>
        <input name="releaseDate" type="date" th:value="${product.releaseDate}" style="width:100%;padding:6px;">
    </div>

    <div style="margin-top:20px;">
        <button type="submit" style="padding:8px 24px;background:#27ae60;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;">保存</button>
        <a th:href="@{/product/list}" style="margin-left:12px;color:#7f8c8d;">取消</a>
    </div>
</form>
