<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }
        body {
            background: #dadfe5;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .welcome-card {
            width: 420px;
            padding: 40px 32px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            text-align: center;
        }
        .welcome-card h2 {
            font-size: 26px; color: #111827; margin-bottom: 12px;
        }
        .welcome-card p {
            font-size: 15px; color: #6b7280; line-height: 1.7;
        }
    </style>
</head>
<body>
<div class="welcome-card">
    <h2>欢迎登录 SmartShop</h2>
    <p>企业级电商管理系统<br>多环境、持久层、权限、缓存全栈整合</p>
</div>
</body>
</html>
