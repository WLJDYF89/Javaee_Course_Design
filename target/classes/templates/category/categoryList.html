<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin:0; padding:0; box-sizing:border-box; font-family:'Microsoft Yahei',sans-serif;
        }
        body {
            background:#dadfe5; color:#111827; padding:24px;
        }
        .page-title {
            font-size:22px; font-weight:700; color:#111827; margin-bottom:20px;
        }
        .card {
            background:#e6e9f0; border-radius:16px; padding:20px;
            box-shadow:0 2px 12px rgba(0,0,0,0.06);
        }
        .add-btn {
            display:inline-block; margin-bottom:16px; padding:10px 22px;
            background:#507593; color:#fff; border:none; border-radius:999px;
            font-size:14px; font-weight:600; cursor:pointer; transition:0.2s;
        }

        .add-btn:hover { background:#1e1e2e; }

        table { width:100%; border-collapse:collapse; }
        table thead th {
            color:#9ca3af; text-align:left; padding:12px 16px; font-size:13px;
            font-weight:600; border-bottom:1px solid #f3f4f6;
        }
        table tbody td {
            padding:14px 16px; font-size:14px; color:#4b5563;
            border-bottom:1px solid #f9fafb;
        }
        .edit {
            padding:6px 16px; background:#507593; color:#fff; border:none;
            border-radius:999px; font-size:13px; font-weight:600; margin-right:8px;
            cursor:pointer; transition:0.2s; text-decoration:none; display:inline-block;
        }

        .edit:hover { background:#1e1e2e; }

        .del {
            padding:6px 16px; background:#ef4444; color:#fff; text-decoration:none;
            border-radius:999px; font-size:13px; font-weight:600; transition:0.2s;
        }

        .del:hover { background:#dc2626; }

        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.35); backdrop-filter:blur(4px); z-index:1000;
            justify-content:center; align-items:center; }
        .modal-overlay.show { display:flex; }
        .modal-box {
            background:#ffffff; border-radius:20px; padding:32px; width:460px;
            max-height:90vh; overflow-y:auto; box-shadow:0 8px 30px rgba(0,0,0,0.12);
        }
        .modal-box h3 { font-size:20px; font-weight:700; color:#111827; margin-bottom:20px; }
        .modal-box .form-item { margin-bottom:16px; }
        .modal-box .form-item label { display:block; margin-bottom:6px; color:#4b5563; font-size:14px; }
        .modal-box .form-item input, .modal-box .form-item textarea {
            width:100%; padding:10px 12px; background:#eef1f7; border:1px solid #e5e7eb;
            border-radius:10px; color:#111827; font-size:15px; outline:none;
        }
        .modal-box .form-item input:focus, .modal-box .form-item textarea:focus {
            border-color:#8b5cf6; box-shadow:0 0 0 3px rgba(139,92,246,0.1);
        }
        .modal-box .form-item textarea { min-height:80px; resize:none; }
        .modal-box .btn-row { display:flex; gap:12px; margin-top:20px; }
        .modal-box .save-btn {
            flex:1; padding:12px; background:#507593; border:none; border-radius:999px;
            color:#fff; font-size:15px; font-weight:600; cursor:pointer; transition:0.2s;
        }

        .modal-box .save-btn:hover { background:#1e1e2e; }

        .modal-box .cancel-btn {
            flex:1; padding:12px; background:#f3f4f6; border:1px solid #e5e7eb;
            border-radius:999px; color:#4b5563; font-size:15px; cursor:pointer; transition:0.2s;
        }

        .modal-box .cancel-btn:hover { background:#e5e7eb; }
    </style>
</head>
<body>
<h2 class="page-title">分类管理</h2>
<div class="card">
    <button class="add-btn" onclick="openCategoryModal()">+ 新增分类</button>
    <table>
        <thead><tr><th>ID</th><th>分类名称</th><th>分类描述</th><th>操作</th></tr></thead>
        <tbody>
        <tr th:each="cate : ${categoryList}">
            <td th:text="${cate.id}"></td>
            <td th:text="${cate.name}"></td>
            <td th:text="${cate.descp}"></td>
            <td>
                <a class="edit" href="javascript:void(0)"
                   th:attr="data-id=${cate.id},data-name=${cate.name},data-descp=${cate.descp}"
                   onclick="openCategoryModal(this)">编辑</a>
                <a class="del" th:href="@{/category/delete/{id}(id=${cate.id})}" onclick="return confirm('确定删除吗？')">删除</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="modal-overlay" id="categoryModal">
    <div class="modal-box">
        <h3 id="categoryModalTitle">新增分类</h3>
        <form id="categoryForm">
            <input type="hidden" name="id" id="categoryId">
            <div class="form-item"><label>分类名称</label><input name="name" id="categoryName" required></div>
            <div class="form-item"><label>分类描述</label><textarea name="descp" id="categoryDescp"></textarea></div>
            <div class="btn-row">
                <button class="save-btn" type="submit">保存</button>
                <button class="cancel-btn" type="button" onclick="closeCategoryModal()">取消</button>
            </div>
        </form>
    </div>
</div>

<script>
    const modal=document.getElementById('categoryModal'),form=document.getElementById('categoryForm'),title=document.getElementById('categoryModalTitle');
    function openCategoryModal(el){
        if(el&&el.dataset.id){title.textContent='编辑分类';
            document.getElementById('categoryId').value=el.dataset.id;
            document.getElementById('categoryName').value=el.dataset.name;
            document.getElementById('categoryDescp').value=el.dataset.descp;}
        else {title.textContent='新增分类';form.reset();document.getElementById('categoryId').value='';}
        modal.classList.add('show');
    }
    function closeCategoryModal(){modal.classList.remove('show');}
    modal.addEventListener('click',function(e){if(e.target===modal)closeCategoryModal();});
    form.addEventListener('submit',function(e){e.preventDefault();var fd=new FormData(form),p=new URLSearchParams();fd.forEach((v,k)=>p.append(k,v));
        fetch('/category/save',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:p.toString()}).then(r=>{if(r.ok||r.redirected){closeCategoryModal();location.reload();}});});
</script>
</body>
</html>
