<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }

        body {
            background: transparent;
            color: #e0e7ff;
            padding: 24px;
        }

        .page-title {
            font-size: 24px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: #ffffff;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 35px rgba(139, 92, 246, 0.25);
        }

        .add-btn {
            display: inline-block;
            margin-bottom: 16px;
            padding: 10px 20px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            color: #ffffff;
            border: none;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .add-btn:hover {
            filter: brightness(1.08);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        table thead th {
            color: #94a3b8;
            text-align: left;
            padding: 12px 16px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        table tbody tr {
            background: #ffffff;
        }

        table tbody td {
            padding: 14px 16px;
            font-size: 14px;
            color: #c7d2fe;
        }

        table tbody td:first-child {
            border-radius: 16px 0 0 16px;
        }

        table tbody td:last-child {
            border-radius: 0 16px 16px 0;
        }

        .edit {
            padding: 6px 16px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            color: #ffffff;
            border: none;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            margin-right: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .edit:hover {
            filter: brightness(1.08);
        }

        .del {
            padding: 6px 16px;
            background: linear-gradient(90deg, #f87171, #ef4444);
            color: #ffffff;
            text-decoration: none;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
        }

        .del:hover {
            filter: brightness(1.1);
        }

        /* ========== 弹窗样式 ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-box {
            background: #ffffff;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 24px;
            padding: 32px;
            width: 460px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 45px rgba(139, 92, 246, 0.35);
        }

        .modal-box h3 {
            font-size: 22px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-box .form-item {
            margin-bottom: 16px;
        }

        .modal-box .form-item label {
            display: block;
            margin-bottom: 6px;
            color: #64748b;
            font-size: 14px;
        }

        .modal-box .form-item input,
        .modal-box .form-item textarea {
            width: 100%;
            padding: 10px 12px;
            background: #ffffff;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 12px;
            color: #1e293b;
            font-size: 15px;
            outline: none;
        }

        .modal-box .form-item input:focus,
        .modal-box .form-item textarea:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .modal-box .form-item textarea {
            min-height: 80px;
            resize: none;
        }

        .modal-box .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-box .save-btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(90deg, #8b5cf6, #06b6d4);
            border: none;
            border-radius: 999px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-box .save-btn:hover {
            filter: brightness(1.08);
        }

        .modal-box .cancel-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 999px;
            color: #64748b;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-box .cancel-btn:hover {
            background: rgba(139, 92, 246, 0.08);
        }
    </style>
</head>
<body>

<h2 class="page-title">分类管理</h2>

<div class="card">
    <button class="add-btn" onclick="openCategoryModal()">+ 新增分类</button>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>分类名称</th>
            <th>分类描述</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cate : ${categoryList}">
            <td th:text="${cate.id}"></td>
            <td th:text="${cate.name}"></td>
            <td th:text="${cate.descp}"></td>
            <td>
                <button class="edit"
                        th:attr="data-id=${cate.id},data-name=${cate.name},data-descp=${cate.descp}"
                        onclick="openCategoryModal(this)">编辑</button>
                <a class="del" th:href="@{/category/delete/{id}(id=${cate.id})}" onclick="return confirm('确定要删除该分类吗？')">删除</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<!-- ========== 弹窗 ========== -->
<div class="modal-overlay" id="categoryModal">
    <div class="modal-box">
        <h3 id="categoryModalTitle">新增分类</h3>
        <form id="categoryForm">
            <input type="hidden" name="id" id="categoryId">

            <div class="form-item">
                <label>分类名称</label>
                <input name="name" id="categoryName" required>
            </div>

            <div class="form-item">
                <label>分类描述</label>
                <textarea name="descp" id="categoryDescp"></textarea>
            </div>

            <div class="btn-row">
                <button class="save-btn" type="submit">保存</button>
                <button class="cancel-btn" type="button" onclick="closeCategoryModal()">取消</button>
            </div>
        </form>
    </div>
</div>

<script>
    const modal = document.getElementById('categoryModal');
    const form = document.getElementById('categoryForm');
    const title = document.getElementById('categoryModalTitle');

    function openCategoryModal(el) {
        if (el) {
            title.textContent = '编辑分类';
            document.getElementById('categoryId').value = el.dataset.id || '';
            document.getElementById('categoryName').value = el.dataset.name || '';
            document.getElementById('categoryDescp').value = el.dataset.descp || '';
        } else {
            title.textContent = '新增分类';
            form.reset();
            document.getElementById('categoryId').value = '';
        }
        modal.classList.add('show');
    }

    function closeCategoryModal() {
        modal.classList.remove('show');
    }

    modal.addEventListener('click', function(e) {
        if (e.target === modal) closeCategoryModal();
    });

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(form);
        const params = new URLSearchParams();
        for (const [k, v] of formData.entries()) params.append(k, v);

        fetch('/category/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
        }).then(function(res) {
            if (res.ok || res.redirected) {
                closeCategoryModal();
                location.reload();
            }
        });
    });
</script>

</body>
</html>
