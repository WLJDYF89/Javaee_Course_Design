<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SmartShop - 用户注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 匹配参考图深紫渐变底色 */
            background: radial-gradient(circle at top left, rgba(124, 58, 237, 0.3), transparent 40%),
            radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.3), transparent 40%),
            linear-gradient(135deg, #2c2050 0%, #3b2b66 100%);
            color: #e0e7ff;
        }

        .register-card {
            width: 440px;
            padding: 36px;
            background: rgba(45, 32, 78, 0.85);
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.28);
        }

        .register-card h2 {
            text-align: center;
            margin-bottom: 26px;
            font-size: 26px;
            /* 紫蓝渐变文字，和参考图标题配色一致 */
            background: linear-gradient(90deg, #a855f7, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .success-tip {
            color: #34d399;
            text-align: center;
            padding: 10px;
            background: rgba(52, 211, 153, 0.12);
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }
        .success-tip a {
            color: #38bdf8;
            text-decoration: none;
        }

        .form-item {
            margin-bottom: 18px;
        }
        .form-item label {
            display: block;
            margin-bottom: 6px;
            color: #c7d2fe;
            font-size: 14px;
        }
        .form-item input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(26, 16, 53, 0.9);
            border: 1px solid rgba(139, 92, 246, 0.35);
            border-radius: 14px;
            color: #e0e7ff;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }
        .form-item input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.16);
        }

        .error-tip {
            color: #f87171;
            text-align: center;
            padding: 10px;
            background: rgba(248, 113, 113, 0.12);
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            /* 参考图同款紫蓝渐变圆角按钮 */
            background: linear-gradient(90deg, #a855f7, #38bdf8);
            border: none;
            border-radius: 999px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .submit-btn:hover {
            filter: brightness(1.1);
        }

        .login-link {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            color: #94a3b8;
        }
        .login-link a {
            color: #a855f7;
            text-decoration: none;
        }
        .login-link a:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>
<div class="register-card">
    <h2>SmartShop 注册</h2>

    <div th:if="${success}" class="success-tip">
        注册成功！<a th:href="@{/login}">立即登录</a>
    </div>

    <form th:unless="${success}" th:action="@{/register}" method="post">
        <div class="form-item">
            <label>账号</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-item">
            <label>密码</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-item">
            <label>确认密码</label>
            <input type="password" name="confirmPassword" required>
        </div>

        <div th:if="${error}" class="error-tip" th:text="${error}"></div>

        <button class="submit-btn" type="submit">注册</button>
    </form>

    <p class="login-link">已有账号？<a th:href="@{/login}">返回登录</a></p>
</div>
</body>
</html>
