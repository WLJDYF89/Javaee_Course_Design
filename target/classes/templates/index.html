<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>SmartShop电商管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }

        body {
            background:
                    radial-gradient(circle at top left, rgba(102, 126, 234, 0.45), transparent 35%),
                    radial-gradient(circle at top right, rgba(118, 75, 162, 0.45), transparent 35%),
                    linear-gradient(135deg, #0f172a 0%, #1e1b4b 45%, #0f172a 100%);
            color: #e0e7ff;
        }

        .header {
            height: 64px;
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(139, 92, 246, 0.35);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 28px;
            font-size: 22px;
            font-weight: 600;
            color: #f8fafc;
        }

        .header .user-info {
            font-size: 14px;
            color: #94a3b8;
        }

        .header .logout-btn {
            color: #f87171;
            text-decoration: none;
            margin-left: 16px;
            padding: 7px 16px;
            border: 1px solid rgba(248, 113, 113, 0.35);
            border-radius: 999px;
            font-size: 13px;
            transition: 0.2s;
        }

        .header .logout-btn:hover {
            background: rgba(248, 113, 113, 0.15);
            border-color: #f87171;
        }

        .main-box {
            display: flex;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 230px;
            background: #0f172a;
            height: calc(100vh - 64px);
            padding-top: 20px;
            position: relative;
            z-index: 2;
        }

        .sidebar a {
            display: block;
            color: #94a3b8;
            padding: 14px 24px;
            margin: 6px 0;
            text-decoration: none;
            font-size: 15px;
            position: relative;
            transition: 0.2s;
        }

        .sidebar a:hover {
            color: #c7d2fe;
        }

        /* 当前选中标签 */
        .sidebar a.active {
            background: #1a1640;
            color: #ffffff;
            border-radius: 28px 0 0 28px;
        }

        /* 上方弧形连接 */
        .sidebar a.active::before {
            content: '';
            position: absolute;
            top: -28px;
            right: 0;
            width: 28px;
            height: 28px;
            background: #0f172a;
            border-radius: 0 0 28px 0;
            box-shadow: 8px 8px 0 8px #1a1640;
        }

        /* 下方弧形连接 */
        .sidebar a.active::after {
            content: '';
            position: absolute;
            bottom: -28px;
            right: 0;
            width: 28px;
            height: 28px;
            background: #0f172a;
            border-radius: 0 28px 0 0;
            box-shadow: 8px -8px 0 8px #1a1640;
        }

        /* ========== 内容区 ========== */
        .content {
            flex: 1;
            background: #1a1640;
            position: relative;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 64px);
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>
<div class="header">
    <span>SmartShop 综合管理系统</span>
    <span class="user-info">
        欢迎, <strong sec:authentication="name">用户</strong>
        <a class="logout-btn" th:href="@{/logout}">退出登录</a>
    </span>
</div>
<div class="main-box">
    <div class="sidebar">
        <a th:href="@{/welcome}" target="mainFrame" class="active">系统首页</a>
        <a th:href="@{/product/list}" target="mainFrame">商品管理</a>
        <a th:href="@{/category/list}" target="mainFrame" sec:authorize="hasRole('admin')">分类管理</a>
    </div>
    <div class="content">
        <iframe name="mainFrame" id="mainFrame"></iframe>
    </div>
</div>

<script>
    const iframe = document.getElementById('mainFrame');
    const defaultUrl = '/welcome';
    const saved = sessionStorage.getItem('mainFrameUrl');

    // 刷新：恢复上次的页面；首次登录：没有保存记录，使用默认首页
    iframe.src = saved || defaultUrl;

    // 根据当前 iframe URL 恢复侧边栏高亮
    function setActive(url) {
        document.querySelectorAll('.sidebar a').forEach(function(a) {
            if (a.getAttribute('href') === url) {
                a.classList.add('active');
            } else {
                a.classList.remove('active');
            }
        });
    }
    setActive(saved || defaultUrl);

    // 点击侧边栏时：保存 URL、更新高亮
    document.querySelectorAll('.sidebar a').forEach(function(link) {
        link.addEventListener('click', function() {
            sessionStorage.setItem('mainFrameUrl', link.getAttribute('href'));
            setActive(link.getAttribute('href'));
        });
    });

    // iframe 内页面跳转时（如分页、提交表单），同步保存 URL
    iframe.addEventListener('load', function() {
        try {
            sessionStorage.setItem('mainFrameUrl', iframe.contentWindow.location.href);
        } catch(e) {}
    });
</script>
</body>
</html>
