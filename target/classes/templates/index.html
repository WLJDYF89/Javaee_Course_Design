<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>SmartShop电商管理平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        .header{height:60px;background:#2c3e50;color:#fff;line-height:60px;padding:0 25px;font-size:22px;display:flex;justify-content:space-between;align-items:center;}
        .header .user-info{font-size:14px;}
        .header .logout-btn{color:#e74c3c;text-decoration:none;margin-left:15px;padding:6px 14px;border:1px solid #e74c3c;border-radius:4px;font-size:13px;transition:all 0.2s;}
        .header .logout-btn:hover{background:#e74c3c;color:#fff;}
        .main-box{display:flex;}
        .sidebar{width:220px;background:#34495e;height:calc(100vh - 60px);padding-top:30px;}
        .sidebar a{display:block;color:#ecf0f1;padding:14px 25px;text-decoration:none;font-size:16px;}
        .sidebar a:hover{background:#486077;}
        iframe{flex:1;height:calc(100vh - 60px);border:none;}
    </style>
</head>
<body>
<div class="header">
    <span>SmartShop 综合管理系统</span>
    <span class="user-info">
        欢迎, <strong sec:authentication="name">用户</strong>
        <a class="logout-btn" th:href="@{/logout}">退出登录</a>
    </span>
</div>
<div class="main-box">
    <div class="sidebar">
        <a th:href="@{/welcome}" target="mainFrame">系统首页</a>
        <a th:href="@{/product/list}" target="mainFrame">商品管理</a>
        <!-- 仅管理员可见分类管理 -->
        <a th:href="@{/category/list}" target="mainFrame" sec:authorize="hasRole('admin')">分类管理</a>
    </div>
    <iframe name="mainFrame" id="mainFrame" th:src="@{/welcome}"></iframe>
    <script>
        const iframe = document.getElementById('mainFrame');
        // 页面加载时恢复上次的iframe页面
        const saved = sessionStorage.getItem('mainFrameUrl');
        if (saved) {
            iframe.src = saved;
        }
        // 侧边栏链接点击时保存目标URL
        document.querySelectorAll('.sidebar a').forEach(function(link) {
            link.addEventListener('click', function() {
                sessionStorage.setItem('mainFrameUrl', link.getAttribute('href'));
            });
        });
        // iframe内导航变化时也更新保存的URL
        iframe.addEventListener('load', function() {
            try {
                sessionStorage.setItem('mainFrameUrl', iframe.contentWindow.location.href);
            } catch(e) {}
        });
    </script>
</div>
</body>
</html>
