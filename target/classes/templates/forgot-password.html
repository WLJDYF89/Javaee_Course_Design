<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="view-transition" content="same-origin">
    <title>SmartShop - 找回密码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft Yahei', sans-serif;
        }

        html {
            background-color: #f0f0f0;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5% 8%;
            background: url('/雪山背景.png') center/auto no-repeat;
            background-color: #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .forgot-card {
            width: 440px;
            padding: 36px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow:
                    0 18px 45px rgba(0, 0, 0, 0.08),
                    0 0 0 1px rgba(168, 85, 247, 0.04);
            z-index: 1;
            animation: slideUp 0.4s ease-out;
        }


        .forgot-card h2 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 24px;
            color: #1e293b;
        }

        .forgot-card .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-item {
            margin-bottom: 16px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
            color: #64748b;
            font-size: 14px;
        }

        .form-item input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(248, 250, 252, 0.95);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: #1e293b;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }

        .form-item input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
        }

        .success-tip {
            color: #10b981;
            text-align: center;
            padding: 10px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }
        .success-tip a {
            color: #a855f7;
            text-decoration: none;
        }

        .error-tip {
            color: #ef4444;
            text-align: center;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #7dd3fc, #507593);
            border: none;
            border-radius: 999px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .submit-btn:hover {
            filter: brightness(1.08);
        }

        .back-link {
            text-align: center;
            margin-top: 22px;
            font-size: 14px;
            color: #94a3b8;
        }
        .back-link a {
            color: #043fc5;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            color: #38bdf8;
        }

        @media (max-width: 992px) {
            body {
                justify-content: center;
                padding: 20px;
            }
            .forgot-card {
                width: 100%;
                max-width: 440px;
            }
        }
    </style>
</head>
<body>

<div class="forgot-card">
    <h2>找回密码</h2>
    <p class="subtitle">Reset your password</p>

    <div th:if="${success}" class="success-tip">
        密码重置成功！<a th:href="@{/login}">前往登录</a>
    </div>

    <form th:unless="${success}" th:action="@{/forgot-password}" method="post">
        <div class="form-item">
            <label>请输入您的账号</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-item">
            <label>新密码</label>
            <input type="password" name="newPassword" required>
        </div>
        <div class="form-item">
            <label>确认新密码</label>
            <input type="password" name="confirmPassword" required>
        </div>

        <div th:if="${error}" class="error-tip" th:text="${error}"></div>

        <button class="submit-btn" type="submit">重置密码</button>
    </form>

    <p class="back-link">想起密码了？<a th:href="@{/login}">返回登录</a></p>
</div>
</body>
</html>
